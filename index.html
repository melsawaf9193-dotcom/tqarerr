<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مقارنة شاملة بين التقريرين</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
h2 { text-align: center; }
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  padding: 40px 20px;
  color: #fff;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mechan.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.container {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1500px;
  margin: auto;
}

.box {
  flex: 0 1 600px;
  min-width: 550px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(6px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s ease;
}

.box:hover { transform: translateY(-5px); }

textarea {
  width: 100%;
  height: 550px;
  padding: 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  resize: none;
  font-family: 'Cairo', sans-serif;
  background: rgba(15, 23, 42, 0.9);
  color: #fff;
  transition: 0.3s;
}

textarea:focus {
  outline: none;
  border-color: #38bdf8;
  box-shadow: 0 0 10px rgba(56,189,248,0.4);
}

button {
  display: block;
  margin: 40px auto;
  padding: 15px 45px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: 0.3s ease;
}

button:hover { transform: scale(1.05); }

.box h3 { text-align: center; }

.result {
  margin: 40px auto 0;
  padding: 25px;
  border-radius: 18px;
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(6px);
  max-width: 1200px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.missing {
  background: rgba(239,68,68,0.15);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  color: #ff6b6b;
  font-weight: bold;
}

hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin: 15px 0;
}
</style>
</head>

<body>

<h2>📊 متابعة السجلات (تقارير نائب العمليات - تقارير الاشراف)</h2>

<div class="container">
  <div class="box">
    <h3>تقرير الإشراف</h3>
    <textarea id="supervision" placeholder="ألصق تقرير الإشراف هنا..."></textarea>
  </div>

  <div class="box">
    <h3>تقرير نائب العمليات</h3>
    <textarea id="operations" placeholder="ألصق تقرير نائب العمليات هنا..."></textarea>
  </div>
</div>

<button onclick="compare()">قارن الآن</button>

<div class="result" id="result"></div>

<script>

/* ===== API USERS ===== */
let usersMap = {};

fetch("https://mechanic-backend.vercel.app/api/users")
.then(res => res.json())
.then(data => {
  const users = Array.isArray(data) ? data : (data.users || data.data || []);
  users.forEach(user => {
    if(user.discord){
      usersMap[String(user.discord)] = {
          nickname: user.nickname || "غير معروف",
          code: user.code || "",
          isWomen: !!user.isWomen 
      };
    }
  });

  // إضافة العضوات يدوياً بعد جلب بيانات الـ API لضمان عدم المسح
  // تم استخدام المعرف الرقمي فقط (بدون <@>) ليتوافق مع دالة getDiscordId
});

/* ===== HELPERS ===== */
function getDiscordId(mention){
  return mention.replace(/[<@!>]/g,"");
}

function formatUser(id){
  const cleanId = getDiscordId(id);
  const user = usersMap[cleanId];
  return user ? `${user.nickname} (${id})` : id;
}

function clean(text){
  return text
    .replace(/\*\*/g,"")
    .replace(/ـ+/g,"")
    .replace(/\[.*?\]\(.*?\)/g,"");
}

function normalizeLabel(label){
  if(!label) return "";
  label = label
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[()]/g, "")
    .replace(/\s+/g, " ")
    .trim();

  const ignoreList = [
    "مسؤول افتتاح المتجر", "مسؤل افتتاح المتجر",
    "المشرف الميداني بروم الكراج",
    "مشرف المنطقة بروم الكراج",
    "مشرف المتدرب بروم الكراج",
    "مشرف المنطقة بروم الكراج"
  ];

  if (ignoreList.some(item => label.includes(item))) return null;

  const map = {
    "قياده الكراج": "القياده", "قيادة الكراج": "القياده", "قياده": "القياده", "قيادة": "القياده",
    "المشرف العام": "اشراف عام", "اشراف عام": "اشراف عام",
    "المشرف الميداني": "اشراف ميداني", "اشراف ميداني": "اشراف ميداني",
    "مشرفين المناطق": "اشراف المناطق", "مشرف المناطق": "اشراف المناطق", "مشرف المنطقة": "اشراف المناطق", "اشراف المناطق": "اشراف المناطق",
    "السيدات و المعتمدين": "المعتمدين", "السيدات والمعتمدين": "المعتمدين", "لاعب معتمد": "المعتمدين",
    "العمليات": "العمليات", "نائب العمليات": "نائب العمليات",
    "مركز الاتصالات": "مركز الاتصالات",
    "فني ميناء لوس": "ميناء لوس", "ميناء لوس": "ميناء لوس",
    "فني ميناء بوليتو": "ميناء بوليتو", "ميناء بوليتو": "ميناء بوليتو",
    "البحث والانقاذ": "البحث والانقاذ", "البحث والإنقاذ": "البحث والانقاذ"
  };
  return map[label] || label;
}

/* ===== ANALYSIS FUNCTIONS ===== */

function extractSections(text){
  const sections = {};
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let currentNormalized = null;
  let currentOriginal = null;

  for (let line of lines) {
    let m = line.match(/^(.+?)\s*:\s*(.*)$/) || line.match(/^(.+?)\s*\(\s*(.*?)\s*\)\s*$/);
    if (m && !line.startsWith("<@")) {
      currentOriginal = m[1].trim();
      currentNormalized = normalizeLabel(currentOriginal);
      
      if (currentNormalized === null) continue;

      const idsInline = (m[2] || "").match(/<@!?\d+>/g) || [];
      for (const id of idsInline) add(id, currentNormalized, currentOriginal);
      continue;
    }
    
    if (currentNormalized !== null) {
      const ids = line.match(/<@!?\d+>/g) || [];
      for (const id of ids) add(id, currentNormalized, currentOriginal);
    }
  }

  function add(id, normalized, original){
    const cleanId = getDiscordId(id);
    const user = usersMap[cleanId];

    if (normalized === "المعتمدين" && user && user.isWomen) {
        return; 
    }

    if (!sections[id]) sections[id] = new Map();
    if (!sections[id].has(normalized)) sections[id].set(normalized, new Set());
    sections[id].get(normalized).add(original);
  }

  const out = {};
  for (const id in sections) {
    out[id] = {};
    for (const [norm, originalsSet] of sections[id].entries()) {
      out[id][norm] = [...originalsSet];
    }
  }
  return out;
}

function checkCodes(text) {
  const lines = text.split("\n").map(l => l.trim());
  let currentSection = "";
  let issues = [];
  lines.forEach(line => {
    if (line.includes(":")) { currentSection = line.replace(":", "").trim(); return; }
    if (/^[A-Za-z]\s*-\s*\d+/.test(line)) {
      const first = line.replace(/\s+/g, "")[0].toLowerCase();
      if (first !== "g") issues.push({ section: currentSection, code: line });
    }
  });
  return issues;
}

function findDuplicateCodesBySection(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let currentSection = "";
  const codeMap = {};
  const duplicates = [];

  lines.forEach(line => {
    if (line.includes(":")) { 
        currentSection = normalizeLabel(line.replace(":", "").trim()); 
        return; 
    }
    if (currentSection === null) return;

    // تعديل الـ Regex ليشمل المسافات المرنة
    const match = line.match(/([A-Za-z]\s*-\s*\d+)/);
    if (match) {
      // إزالة كل المسافات تماماً للمقارنة
      const code = match[1].replace(/\s+/g, "").toUpperCase();
      if (!codeMap[code]) codeMap[code] = {};
      if (!codeMap[code][currentSection]) codeMap[code][currentSection] = 0;
      codeMap[code][currentSection]++;
    }
  });

  for (const code in codeMap) {
    const sections = Object.keys(codeMap[code]);
    sections.forEach(sec => {
      if (codeMap[code][sec] > 1) duplicates.push({ code, section: sec, count: codeMap[code][sec], type: "داخل نفس القسم" });
    });
    if (sections.length > 1) duplicates.push({ code, sections, type: "بين الأقسام" });
  }
  return duplicates;
}

// دالة الفحص المدمجة للموانئ ومخالفات البنات
function checkSpecialViolations(text) {
    const lines = text.split("\n");
    let issues = [];

    // 1. جمع كل الأكواد الموجودة وتوحيد شكلها (إزالة المسافات وتحويلها لكبيرة)
    const allCodesInReport = text.match(/[A-Z]\s*-\s*\d+/gi) || [];
    const normalizedAllCodes = allCodesInReport.map(c => c.replace(/\s+/g, '').toUpperCase());

    lines.forEach(line => {
        const mentions = line.match(/<@!?\d+>/g);
        if (!mentions) return;

        mentions.forEach(m => {
            const user = usersMap[getDiscordId(m)];
            if (!user) return;

            // توحيد كود المستخدم من قاعدة البيانات
            const userCodeClean = user.code ? user.code.replace(/\s+/g, '').toUpperCase() : null;

            // فحص الموانئ
            if (line.includes("ميناء لوس") || line.includes("ميناء بوليتو")) {
                const portName = line.includes("لوس") ? "ميناء لوس" : "ميناء بوليتو";
                if (userCodeClean) {
                    if (!normalizedAllCodes.includes(userCodeClean)) {
                        issues.push(`فني ${portName} **${user.nickname}** كوده **(${user.code})** غير مسجل في تقرير نائب العمليات.`);
                    }
                }
            }

            // فحص البنات
            if ((line.includes("السيدات") || line.includes("المعتمدين")) && user.isWomen) {
                if (userCodeClean) {
                    if (normalizedAllCodes.includes(userCodeClean)) {
                         issues.push(`الكادر النسئى **${user.nickname}** كودها **(${user.code})** كودها مكتوب تحت في الاكواد في تقرير النائب.`);
                    }
                }
            }
        });
    });
    return [...new Set(issues)];
}

/* ===== MAIN COMPARE FUNCTION ===== */

function compare(){
  const opsRaw = document.getElementById("operations").value;
  const supRaw = document.getElementById("supervision").value;
  const result = document.getElementById("result");

  if(!opsRaw || !supRaw) {
      result.innerHTML = "<div class='missing'>يرجى ملء كلا التقريرين للمقارنة.</div>";
      return;
  }

  let output = "";
  let hasDifference = false;

  // تشغيل فحص الموانئ والبنات
  let specialIssues = checkSpecialViolations(opsRaw);
  if(specialIssues.length > 0) {
      hasDifference = true;
      output += "<div class='missing'>⚠️ تنبيهات الفنيات والموانئ:</div>";
      specialIssues.forEach(msg => output += `• ${msg}<br>`);
      output += "<hr>";
  }

  const codeIssues = checkCodes(opsRaw);
  const duplicates = findDuplicateCodesBySection(opsRaw);

  if (duplicates.length) {
    hasDifference = true;
    output += "<div class='missing'>⚠ أكواد مكررة:</div>";
    duplicates.forEach(item => {
      if (item.type === "داخل نفس القسم") output += `الكود: ${item.code} مكرر في ${item.section}<br>`;
      else output += `الكود: ${item.code} موجود في: ${item.sections.join(" و ")}<br>`;
    });
    output += "<hr>";
  }

  if (codeIssues.length) {
    hasDifference = true;
    output += "<div class='missing'>⚠ أكواد غلط (لا تبدأ بـ G):</div>";
    codeIssues.forEach(item => output += `القسم: ${item.section} → الكود: ${item.code}<br>`);
    output += "<hr>";
  }

  const sup = extractSections(clean(supRaw));
  const ops = extractSections(clean(opsRaw));

  const originalsForNorms = (obj, norms) => {
    const outArr = [];
    for (const n of norms) {
      const arr = obj[n] || [];
      for (const x of arr) outArr.push(x);
    }
    return [...new Set(outArr)];
  };

  Object.keys(sup).sort().forEach(id => {
    if (!ops[id]) {
      hasDifference = true;
      output += `<div class='missing'>${formatUser(id)}</div>موجود في تقرير الاشراف وغير موجود في تقرير النائب.<br>`;
      output += originalsForNorms(sup[id], Object.keys(sup[id])).join("<br>") + "<hr>";
    }
  });

  Object.keys(ops).sort().forEach(id => {
    if (!sup[id]) {
      hasDifference = true;
      output += `<div class='missing'>${formatUser(id)}</div>موجود في تقرير النائب وغير موجود في تقرير الإشراف.<br>`;
      output += originalsForNorms(ops[id], Object.keys(ops[id])).join("<br>") + "<hr>";
    }
  });

  if (!hasDifference) output = "<b>✔ لا يوجد أي اختلاف والتقرير سليم تماماً</b>";
  result.innerHTML = output;
}

/* ===== PROTECT PAGE ===== */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.ctrlKey && ['u','s','i','j'].includes(e.key.toLowerCase())) e.preventDefault();
});
</script>

</body>
</html>
